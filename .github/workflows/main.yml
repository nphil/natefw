name: Build Core Firmware

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Crucial: Gives the workflow permission to create releases

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Cache PlatformIO Folders
      uses: actions/cache@v4
      with:
        path: |
          ~/.platformio
          ats-mini-core/.pio
        key: ${{ runner.os }}-platformio-${{ hashFiles('ats-mini-core/platformio.ini') }}
        restore-keys: |
          ${{ runner.os }}-platformio-

    - name: Install PlatformIO
      run: |
        python -m pip install --upgrade pip
        pip install --upgrade platformio

    - name: Compile Firmware
      working-directory: ats-mini-core
      run: pio run

    - name: Create Automated Pre-Release
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v0.0.${{ github.run_number }}-alpha
        name: "Core Firmware Pre-Release v0.0.${{ github.run_number }}"
        body: |
          Automated development build from commit ${{ github.sha }}.
          
          **Flashing Instructions:**
          Download the `firmware.bin` below and flash it via your recovery menu partition.
        prerelease: true
        files: |
          ats-mini-core/.pio/build/esp32s3/firmware.bin
