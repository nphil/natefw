[env:esp32s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200

# Fixed Hardware Flag Corrections
board_build.flash_mode = dio       ; CRITICAL: Keeps DIO active to avoid OPI PSRAM conflict
board_build.f_flash = 80000000L    ; Changed to 80MHz so PlatformIO can find the precompiled bootloader elf
board_build.partitions = partitions.csv

build_flags =
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D ARDUINO_USB_MODE=1
    -D BOARD_HAS_PSRAM
    -D CONFIG_SPIRAM_MODE_OCT=1     ; Enable 8MB Octal SPI PSRAM configurations
    
lib_deps =
    https://github.com/lovyan03/LovyanGFX.git#1.1.16
