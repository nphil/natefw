[env:esp32s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200

# Critical Hardware Flag Corrections matching CLAUDE.md
board_build.flash_mode = dio       ; CRITICAL: Must be dio to prevent OPI PSRAM pin conflict
board_build.f_flash = 40000000L    ; Force 40MHz flash frequency
board_build.partitions = partitions.csv

build_flags =
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D ARDUINO_USB_MODE=1
    -D BOARD_HAS_PSRAM
    -D CONFIG_SPIRAM_MODE_OCT=1     ; Enable 8MB Octal SPI PSRAM configurations
    
lib_deps =
    https://github.com/lovyan03/LovyanGFX.git#1.1.16
